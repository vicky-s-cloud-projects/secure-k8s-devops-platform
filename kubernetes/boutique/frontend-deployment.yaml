apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:

      serviceAccountName: boutique-sa

      imagePullSecrets:
        - name: ecr-secret

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - frontend
            topologyKey: kubernetes.io/hostname

      # POD security context (correct place)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend
          image: 998948477550.dkr.ecr.eu-west-2.amazonaws.com/boutique-frontend:v1

          # container security context (correct place)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          ports:
            - containerPort: 8080

          env:
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"
            - name: SHIPPING_SERVICE_ADDR
              valueFrom:
                secretKeyRef:
                  name: boutique-secret
                  key: SHIPPING_SERVICE_ADDR
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: PAYMENT_SERVICE_ADDR
              valueFrom:
                secretKeyRef:
                  name: boutique-secret
                  key: PAYMENT_SERVICE_ADDR
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                secretKeyRef:
                  name: boutique-secret
                  key: EMAIL_SERVICE_ADDR
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice:8080"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"